name: Score + Promote Baseline
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  score:
    # Skip commits made by this workflow to avoid infinite loops.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.BASELINE_PAT }}

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Verify frozen files unchanged
        run: |
          node - <<'EOF'
          import { readFileSync } from 'fs';
          import { createHash } from 'crypto';
          const expected = JSON.parse(readFileSync('.teleport/frozen-hashes.json', 'utf8'));
          let failed = false;
          for (const [file, want] of Object.entries(expected)) {
            let got;
            try {
              got = createHash('sha256').update(readFileSync(file)).digest('hex');
            } catch {
              console.error(`MISSING: ${file}`);
              failed = true;
              continue;
            }
            if (got !== want) {
              console.error(`TAMPERED: ${file}`);
              console.error(`  expected ${want}`);
              console.error(`  got      ${got}`);
              failed = true;
            }
          }
          if (failed) {
            console.error('\nFrozen files have been modified. These are judge-controlled.');
            process.exit(1);
          }
          console.log('Frozen files OK');
          EOF

      - name: Overlay frozen fixture
        run: |
          cp frozen/isaac64.js js/isaac64.js
          cp frozen/terminal.js js/terminal.js
          cp frozen/storage.js js/storage.js

      - name: Score public sessions
        run: |
          node frozen/ps_test_runner.mjs sessions/ \
            2>score-stderr.txt | tee score-stdout.txt
          cat score-stderr.txt >&2

      - name: Extract score summary
        run: |
          node -e "
            const fs = require('fs');
            const raw = fs.readFileSync('score-stdout.txt', 'utf8');
            const idx = raw.lastIndexOf('__RESULTS_JSON__');
            if (idx < 0) { console.log('No results found'); process.exit(1); }
            const data = JSON.parse(raw.slice(idx + '__RESULTS_JSON__'.length).trim());
            const results = data.results || [];
            const passed = results.filter(r => r.passed).length;
            const total = results.length;
            const rngPct = total > 0
              ? (results.reduce((s, r) => s + (r.metrics?.rngCalls?.matched || 0), 0)
                 / results.reduce((s, r) => s + (r.metrics?.rngCalls?.total || 1), 0) * 100).toFixed(1)
              : '0.0';
            console.log(JSON.stringify({ passed, total, rngPct, timestamp: data.timestamp }));
            fs.writeFileSync('score-summary.json', JSON.stringify({ passed, total, rngPct, timestamp: data.timestamp, results: results.map(r => ({ session: r.session, passed: r.passed, rng: r.metrics?.rngCalls, screen: r.metrics?.screens, cursor: r.metrics?.cursor })) }, null, 2));
          "

      - name: Promote baseline if score improved
        run: node scripts/promote-baseline.mjs score-stdout.txt scores/baseline.json

      - name: Commit updated baseline
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores/baseline.json
          if git diff --staged --quiet; then
            echo "Baseline unchanged — nothing to commit"
          else
            git commit -m "chore: promote baseline score [skip ci]"
            git push
          fi

      - name: Build Pages
        run: |
          npm run pages:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Upload results
        uses: actions/upload-artifact@v7.0.1
        with:
          name: score-results
          path: |
            score-summary.json
            score-stdout.txt

  deploy-pages:
    needs: score
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
